{% extends "base.html" %}
{% block title %}Reset Password · XPense{% endblock %}

{% block content %}
<div style="max-width:460px; margin:3rem auto;">
    <div class="card" style="margin-bottom:0;">
        <div class="section-header" style="margin-bottom:1.25rem;">
            <h1 class="section-title">Set New Password</h1>
            <span class="text-accent" style="font-size:0.72rem;">Secure</span>
        </div>

        <form method="POST" action="{{ url_for('reset_password', token=token) }}">
            <div class="form-group">
                <label class="form-label" for="password">New Password</label>
                <input class="form-input" type="password" name="password" id="password" autocomplete="new-password" minlength="8" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="password_confirm">Confirm New Password</label>
                <input class="form-input" type="password" name="password_confirm" id="password_confirm" autocomplete="new-password" minlength="8" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">Update Password</button>
        </form>

        <p class="text-muted" style="font-size:0.78rem; margin-top:1rem;">
            Back to <a href="{{ url_for('login') }}" class="text-accent">login</a>
        </p>
    </div>
</div>
{% endblock %}
