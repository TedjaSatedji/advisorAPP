{% extends "base.html" %}
{% block title %}Register · XPense{% endblock %}

{% block content %}
<div style="max-width:460px; margin:3rem auto;">
    <div class="card" style="margin-bottom:0;">
        <div class="section-header" style="margin-bottom:1.25rem;">
            <h1 class="section-title">Create Account</h1>
            <span class="text-accent" style="font-size:0.72rem;">New User</span>
        </div>

        <form method="POST" action="{{ url_for('register') }}">
            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input class="form-input" type="email" name="email" id="email" autocomplete="email" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input class="form-input" type="password" name="password" id="password" autocomplete="new-password" minlength="8" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="password_confirm">Confirm Password</label>
                <input class="form-input" type="password" name="password_confirm" id="password_confirm" autocomplete="new-password" minlength="8" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">Create Account</button>
        </form>

        <p class="text-muted" style="font-size:0.78rem; margin-top:1rem;">
            Already registered? <a href="{{ url_for('login') }}" class="text-accent">Log in</a>
        </p>
    </div>
</div>
{% endblock %}
